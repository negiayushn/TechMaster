    {id:"two-pointers", title:"Two Pointers", desc:"Sorted arrays, cycle detection, container with most water.",
      cheat:"<strong>What is it?</strong> Two pointers traverse data structure with two references, moving toward or away from each other based on conditions.<br><strong>Why it matters</strong> Reduces O(n^2) brute force to O(n) for many array/string problems; essential for sorted array manipulation and cycle detection.<br><strong>Real-world uses</strong> String palindrome validation, memory defragmentation, merging sorted data streams, network packet inspection.<br><strong>Key Patterns:</strong> Opposite pointers from both ends (sorted arrays), slow/fast pointers (cycle detection), sliding window with two pointers.<br><strong>Common Functions & Methods:</strong> <code>while(l<r)</code> loop for opposite pointers, <code>while(fast && fast.next)</code> for slow/fast, <code>while(r < arr.length)</code> for sliding window.<br><strong>Code Templates:</strong> <pre>// Opposite ends - pair sum\nlet l=0, r=arr.length-1;\nwhile(l<r){\n  let sum=arr[l]+arr[r];\n  if(sum===target) return [l,r];\n  sum<target ? l++ : r--;\n}\n// Slow/fast - cycle detection\nlet slow=head, fast=head;\nwhile(fast && fast.next){\n  slow=slow.next;\n  fast=fast.next.next;\n  if(slow===fast) return true;\n}\nreturn false;</pre>",

    {id:"stack-queue", title:"Stack & Queue", desc:"Valid parentheses, min stack, monotonic stack.",
      cheat:"<strong>What is it?</strong> Stack is LIFO (last-in-first-out); queue is FIFO (first-in-first-out). Deque supports both ends.<br><strong>Why it matters</strong> Stack enables undo/redo, expression evaluation, and monotonic patterns. Queue enables BFS, task scheduling, and buffering.<br><strong>Real-world uses</strong> Browser history (stack), print spooler (queue), call stack in recursion, sliding window max (deque), undo in editors.<br><strong>Key Patterns:</strong> Monotonic stack (next greater element), stack for parentheses matching, queue for BFS, deque for sliding window maximum.<br><strong>Common Functions & Methods:</strong> <code>push()</code>/<code>pop()</code> for stacks, queue via index pointers (avoids O(n) shift), <code>Array(length).fill()</code> for circular queue.<br><strong>Code Templates:</strong> <pre>// Monotonic decreasing stack\nlet stack = [];\nfor(let n of arr){\n  while(stack.length && n>stack[stack.length-1])\n    stack.pop();\n  stack.push(n);\n}\n// Queue with pointers\nlet q=[], head=0;\nq.push(val);\nlet front=q[head++];\n// BFS\nlet q=[root], seen=new Set();\nwhile(q.length){\n  let n=q.shift();\n  for(let nei of n.neighbors)\n    if(!seen.has(nei)){seen.add(nei);q.push(nei);}\n}</pre>",

    {id:"binary-search", title:"Binary Search", desc:"Classic binary search, rotated array, 2D matrix.",
      cheat:"<strong>What is it?</strong> Binary search halves the search space each iteration by comparing target to the middle element of a sorted range.<br><strong>Why it matters</strong> O(log n) vs O(n) linear search; enables fast search in sorted data and is adaptable to answer-space problems (minimize max, etc).<br><strong>Real-world uses</strong> Dictionary lookup, database B-tree indexing, debugging (git bisect), network routing tables, game number guessing.<br><strong>Key Patterns:</strong> Find exact target, find leftmost/rightmost insertion point, search in rotated array, binary search on answer space.<br><strong>Common Functions & Methods:</strong> <code>Math.floor()</code>/<code>Math.ceil()</code> for mid, <code>while(l<=r)</code> vs <code>while(l<r)</code> variants, <code>l=mid+1</code> / <code>r=mid-1</code> for exclusion.<br><strong>Code Templates:</strong> <pre>// Standard binary search\nlet l=0, r=arr.length-1;\nwhile(l<=r){\n  let m = l + Math.floor((r-l)/2);\n  if(arr[m]===target) return m;\n  arr[m]<target ? l=m+1 : r=m-1;\n}\nreturn -1;\n// Leftmost insertion (lower bound)\nwhile(l<r){\n  let m = l + Math.floor((r-l)/2);\n  arr[m]<target ? l=m+1 : r=m;\n}\nreturn l;</pre>",

    {id:"linked-list", title:"Linked List", desc:"Reverse, merge, detect cycle, LRU cache.",
      cheat:"<strong>What is it?</strong> Linked list is a linear collection where each node points to the next (singly) or prev/next (doubly).<br><strong>Why it matters</strong> Dynamic size, O(1) insert/delete at head vs array O(n) shift; teaches pointer manipulation crucial for advanced DS.<br><strong>Real-world uses</strong> LRU cache, undo functionality, image viewer (previous/next), music playlist, browser history, file system allocation.<br><strong>Key Patterns:</strong> Dummy node for head modifications, slow/fast pointer for cycle/middle, reverse in-place, merge two lists, runner technique.<br><strong>Common Functions & Methods:</strong> <code>new ListNode()</code> for node creation, pointer manipulation for insert/delete, dummy head to avoid edge cases.<br><strong>Code Templates:</strong> <pre>// Reverse linked list\nlet prev = null, curr = head;\nwhile(curr){\n  let next = curr.next;\n  curr.next = prev;\n  prev = curr;\n  curr = next;\n}\nreturn prev;\n// Find middle\nlet slow=head, fast=head;\nwhile(fast && fast.next){\n  slow=slow.next;\n  fast=fast.next.next;\n}\nreturn slow;</pre>",

    {id:"trees", title:"Trees", desc:"DFS, BFS, BST, LCA, serialization.",
      cheat:"<strong>What is it?</strong> Tree is a hierarchical structure with nodes; each node has children. BST, binary tree, N-ary tree, trie variants.<br><strong>Why it matters</strong> Trees model hierarchical data; DFS/BFS traversals are the most common interview patterns. BST enables O(log n) search/insert/delete.<br><strong>Real-world uses</strong> File system directories, HTML DOM, compilers (AST), network routing, database indexes (B-trees), decision trees in ML.<br><strong>Key Patterns:</strong> DFS recursion (pre/in/post-order), BFS level-order, BST property (left<root<right), LCA recursion, path sum patterns, serialize/deserialize.<br><strong>Common Functions & Methods:</strong> Recursive traversal, queue for BFS, stack for iterative DFS, <code>Math.max()</code> for height calculation.<br><strong>Code Templates:</strong> <pre>// DFS inorder (recursive)\nfunction dfs(node){\n  if(!node) return;\n  dfs(node.left);\n  visit(node.val);\n  dfs(node.right);\n}\n// BFS level-order\nlet q=[root];\nwhile(q.length){\n  let len=q.length, level=[];\n  for(let i=0;i<len;i++){\n    let n=q.shift();\n    level.push(n.val);\n    if(n.left) q.push(n.left);\n    if(n.right) q.push(n.right);\n  }\n  res.push(level);\n}\nreturn res;</pre>",

    {id:"dp", title:"Dynamic Programming", desc:"Knapsack, LCS, LIS, coin change, matrix DP.",
      cheat:"<strong>What is it?</strong> DP solves problems by breaking them into overlapping subproblems and storing results to avoid recomputation (memoization or tabulation).<br><strong>Why it matters</strong> Converts exponential brute force to polynomial time; essential for optimization problems (min/max, count, boolean).<br><strong>Real-world uses</strong> Shortest path (Google Maps), bioinformatics (DNA sequence alignment), resource allocation, speech recognition, game AI.<br><strong>Key Patterns:</strong> 1D DP (fibonacci, climb stairs), 2D DP (grid paths, LCS), 0/1 knapsack, unbounded knapsack (coin change), LIS (binary search variant), state machine (stock buy/sell).<br><strong>Common Functions & Methods:</strong> <code>Array(n).fill(0)</code> for DP table, <code>Math.max()</code>/<code>Math.min()</code> for transitions, nested loops for iteration, recursion+memo for top-down.<br><strong>Code Templates:</strong> <pre>// 1D DP\nlet dp=[0,1];\nfor(let i=2;i<=n;i++)\n  dp[i]=dp[i-1]+dp[i-2];\nreturn dp[n];\n// 0/1 Knapsack\nfor(let i=1;i<=n;i++)\n  for(let w=W;w>=wt[i-1];w--)\n    dp[w]=Math.max(dp[w], dp[w-wt[i-1]]+val[i-1]);\n// LIS O(n^2)\nlet dp=new Array(n).fill(1);\nfor(let i=0;i<n;i++)\n  for(let j=0;j<i;j++)\n    if(arr[j]<arr[i]) dp[i]=Math.max(dp[i],dp[j]+1);</pre>",

    {id:"graphs", title:"Graphs", desc:"BFS/DFS, topological sort, Dijkstra, union-find.",
      cheat:"<strong>What is it?</strong> Graph is nodes (vertices) connected by edges; can be directed/undirected, weighted/unweighted, cyclic/acyclic.<br><strong>Why it matters</strong> Graphs model complex relationships; traversal (DFS/BFS) and shortest path (Dijkstra/Bellman-Ford) are cornerstone interview topics.<br><strong>Real-world uses</strong> Social networks (friendships), GPS navigation (shortest path), web crawling, recommendation engines, network routing.<br><strong>Key Patterns:</strong> DFS/BFS for connectivity, adjacency list representation, topological sort (Kahn's algorithm), Dijkstra (shortest path), union-find (disjoint sets for cycle detection), bipartite check.<br><strong>Common Functions & Methods:</strong> <code>new Map()</code> for adjacency list, queue for BFS, stack/recursion for DFS, <code>new MinPriorityQueue()</code> for Dijkstra.<br><strong>Code Templates:</strong> <pre>// Adjacency list\nlet adj = new Map();\nfor(let [u,v] of edges){\n  if(!adj.has(u)) adj.set(u,[]);\n  adj.get(u).push(v);\n  if(!adj.has(v)) adj.set(v,[]);\n  adj.get(v).push(u);\n}\n// DFS\nfunction dfs(u, visited){\n  if(visited.has(u)) return;\n  visited.add(u);\n  for(let v of (adj.get(u)||[]))\n    dfs(v, visited);\n}</pre>",

    {id:"heap", title:"Heap / Priority Queue", desc:"Top K, median, merge K sorted, task scheduler.",
      cheat:"<strong>What is it?</strong> Heap is a complete binary tree where parent is smaller (min-heap) or larger (max-heap) than children; priority queue is an abstract type backed by heap.<br><strong>Why it matters</strong> O(log n) insert/delete with O(1) min/max; essential for Top K, median tracking, scheduling, and K-way merge problems.<br><strong>Real-world uses</strong> Task scheduling (OS), Dijkstra's algorithm, Huffman coding, emergency room triage, stock market order matching.<br><strong>Key Patterns:</strong> Min-heap for smallest elements, max-heap for largest, Top K pattern (heap of size k), median from data stream (two heaps), K-way merge.<br><strong>Common Functions & Methods:</strong> <code>new MinPriorityQueue()</code>/<code>new MaxPriorityQueue()</code> (LeetCode), custom heap via array with <code>push()</code>/<code>pop()</code> and sift operations.<br><strong>Code Templates:</strong> <pre>// Top K frequent (bucket sort alternative)\nlet heap = [];\nfor(let [num,freq] of map){\n  heap.push([freq,num]);\n  heap.sort((a,b)=>a[0]-b[0]);\n  if(heap.length>k) heap.shift();\n}\nreturn heap.map(x=>x[1]);\n// Median from stream\nlet lo=[], hi=[];\n// lo=maxHeap (negate), hi=minHeap\n</pre>",

    {id:"greedy", title:"Greedy & Intervals", desc:"Meeting rooms, merge intervals, jump game, scheduling.",
      cheat:"<strong>What is it?</strong> Greedy makes locally optimal choice at each step hoping it leads to global optimum. Intervals deal with ranges and overlaps.<br><strong>Why it matters</strong> Greedy gives optimal solution for problems with optimal substructure and greedy choice property; interval problems are very common in scheduling.<br><strong>Real-world uses</strong> Meeting room scheduling, CPU job scheduling, Huffman encoding, minimum spanning tree (Prim's/Kruskal's), coin change (canonical currencies).<br><strong>Key Patterns:</strong> Sort by start/end time, merge overlapping intervals, sweep line for meeting rooms, greedy choice for local optimum (jump game, gas station), sort by end for non-overlapping count.<br><strong>Common Functions & Methods:</strong> <code>sort((a,b)=>a[0]-b[0])</code> for start sorting, <code>sort((a,b)=>a[1]-b[1])</code> for end sorting.<br><strong>Code Templates:</strong> <pre>// Merge intervals\nintervals.sort((a,b)=>a[0]-b[0]);\nlet res = [intervals[0]];\nfor(let i=1;i<intervals.length;i++){\n  let last=res[res.length-1];\n  if(intervals[i][0]<=last[1])\n    last[1]=Math.max(last[1], intervals[i][1]);\n  else res.push(intervals[i]);\n}\nreturn res;\n// Non-overlapping count (sort by end)\nintervals.sort((a,b)=>a[1]-b[1]);</pre>",

    {id:"backtracking", title:"Backtracking", desc:"Permutations, subsets, N-queens, combination sum.",
      cheat:"<strong>What is it?</strong> Backtracking explores all candidates via DFS, abandoning (pruning) paths that cannot lead to a valid solution.<br><strong>Why it matters</strong> Only general technique for constraint satisfaction problems (N-Queens, Sudoku); teaches exhaustive search with pruning for efficiency.<br><strong>Real-world uses</strong> Crossword puzzle solvers, constraint satisfaction in AI, pathfinding in games, scheduling with constraints, regex matching.<br><strong>Key Patterns:</strong> Subsets (choose/not-choose), permutations (swap/backtrack), combination sum (target with candidates), pruning invalid paths early, N-Queens row-by-row placement.<br><strong>Common Functions & Methods:</strong> Recursive backtracking with <code>for</code> loop for choices, <code>push()</code> + recurse + <code>pop()</code> pattern, <code>used</code> array for permutations.<br><strong>Code Templates:</strong> <pre>// Subsets\nfunction bT(start, path){\n  res.push([...path]);\n  for(let i=start;i<nums.length;i++){\n    path.push(nums[i]);\n    bT(i+1,path);\n    path.pop();\n  }\n}\nbT(0,[]);\nreturn res;\n// Permutations\nfunction bT(path){\n  if(path.length===nums.length) res.push([...path]);\n  for(let n of nums){\n    if(used.has(n)) continue;\n    used.add(n); path.push(n);\n    bT(path);\n    path.pop(); used.delete(n);\n  }\n}</pre>",

      {id:"strings", title:"Strings", desc:"Pattern matching, string manipulation, encoding.",
        cheat:"<strong>What is it?</strong> Strings are sequences of characters; often treated as character arrays with specific manipulation methods.<br><strong>Why it matters</strong> String problems test pattern matching, sliding window, DP (LCS, edit distance), and character frequency techniques. Very common in interviews.<br><strong>Real-world uses</strong> Search engines (pattern matching), spell checkers, DNA sequence analysis, text editors, encryption, data serialization.<br><strong>Key Patterns:</strong> String building (join/split), character frequency counting (array of 26), sliding window on strings, palindrome checks (two pointers), substring search (KMP/Rabin-Karp).<br><strong>Common Functions & Methods:</strong> <code>split('')</code>/<code>join('')</code>, <code>charCodeAt()</code>, <code>substring()</code>/<code>slice()</code>, <code>indexOf()</code>, <code>includes()</code>, <code>startsWith()</code>/<code>endsWith()</code>, <code>trim()</code>/<code>replace()</code>.<br><strong>Code Templates:</strong> <pre>// Char frequency (lowercase)\nlet freq = new Array(26).fill(0);\nfor(let c of s)\n  freq[c.charCodeAt(0)-97]++;\n// Palindrome check\nlet l=0, r=s.length-1;\nwhile(l<r){\n  if(s[l]!==s[r]) return false;\n  l++; r--;\n}\nreturn true;\n// Sliding window substring\nlet map=new Map(), l=0;\nfor(let r=0;r<s.length;r++){\n  map.set(s[r],(map.get(s[r])||0)+1);\n  while(map.get(s[r])>1){\n    map.set(s[l],map.get(s[l])-1);\n    if(map.get(s[l])===0) map.delete(s[l]);\n    l++;\n  }\n  max=Math.max(max,r-l+1);\n}</pre>",

      {id:"bit-manipulation", title:"Bit Manipulation", desc:"XOR tricks, bit counting, power of two.",
        cheat:"<strong>What is it?</strong> Bit manipulation operates directly on binary representations of integers using bitwise operators (AND, OR, XOR, NOT, shifts).<br><strong>Why it matters</strong> Extremely fast (single CPU instruction); solves problems that seem complex with arithmetic (find unique, power of two, subset enumeration) in O(1)/O(n).<br><strong>Real-world uses</strong> Cryptography, graphics (color channels), network addressing (subnet masks), compression, flags/permissions systems, checksums (CRC).<br><strong>Key Patterns:</strong> XOR for finding unique element (<code>a^a=0</code>), bit masking (<code>1<<k</code>), counting set bits (Brian Kernighan's), power of two (<code>n&(n-1)</code>), subset enumeration via bitmasks.<br><strong>Common Functions & Methods:</strong> <code>&</code> (AND), <code>|</code> (OR), <code>^</code> (XOR), <code>~</code> (NOT), <code><<</code> / <code>>></code> (left/right shift), <code>>>></code> (unsigned shift).<br><strong>Code Templates:</strong> <pre>// Check/set/clear kth bit\n(n>>k)&1    // get\nn |= (1<<k)  // set\nn &= ~(1<<k) // clear\n// Count set bits (Brian Kernighan)\nlet c=0;\nwhile(n){ n &= n-1; c++; }\n// Power of two\n(n & n-1) === 0\n// XOR for single number\nlet res=0;\nfor(let n of arr) res ^= n;\nreturn res;</pre>",

      {id:"math-geometry", title:"Math & Geometry", desc:"Number theory, geometry, prime numbers.",
        cheat:"<strong>What is it?</strong> Math problems involve number theory, arithmetic, algebra; geometry involves points, lines, shapes, and spatial relationships.<br><strong>Why it matters</strong> Tests mathematical reasoning and ability to translate formulas into code; geometry problems test coordinate systems and edge cases.<br><strong>Real-world uses</strong> Cryptography (prime numbers, GCD), computer graphics (geometry), GPS (distance calculations), error detection (checksums), financial calculations.<br><strong>Key Patterns:</strong> GCD via Euclidean algorithm, prime checking (sieve of Eratosthenes), digit manipulation (reverse integer), geometry (slope, area, collinearity), fast exponentiation (pow).<br><strong>Common Functions & Methods:</strong> <code>Math.sqrt()</code>, <code>Math.pow()</code>, <code>Math.floor()</code>, <code>%</code> for modulo, <code>Math.min()</code>/<code>Math.max()</code>, <code>Math.abs()</code>.<br><strong>Code Templates:</strong> <pre>// GCD (Euclidean)\nfunction gcd(a,b){\n  while(b){ [a,b]=[b,a%b]; }\n  return a;\n}\n// LCM\na*b/gcd(a,b)\n// Prime check\nfunction isPrime(n){\n  if(n<2) return false;\n  for(let i=2;i*i<=n;i++)\n    if(n%i===0) return false;\n  return true;\n}\n// Fast pow\nfunction pow(x,n){\n  if(n===0) return 1;\n  let h=pow(x,Math.floor(n/2));\n  return n%2===0 ? h*h : h*h*x;\n}</pre>",

      {id:"trie", title:"Trie", desc:"Prefix tree, autocomplete, word search.",
        cheat:"<strong>What is it?</strong> Trie (prefix tree) is an N-ary tree where each node represents a character; words are stored by traversing character by character from root.<br><strong>Why it matters</strong> O(L) search/insert (L=word length) regardless of dictionary size; enables fast prefix matching, autocomplete, and spell checking.<br><strong>Real-world uses</strong> Autocomplete (Google search), spell checkers, IP routing (longest prefix match), T9 predictive text, dictionary word games (Boggle).<br><strong>Key Patterns:</strong> Insert words into trie (each node is a character), search exact word, search prefix, DFS for autocomplete/word search, backtracking on trie for Word Search II.<br><strong>Common Functions & Methods:</strong> <code>new TrieNode()</code> with <code>children</code> map and <code>isEnd</code> flag, <code>insert()</code>, <code>search()</code>, <code>startsWith()</code>.<br><strong>Code Templates:</strong> <pre>class TrieNode {\n  constructor() {\n    this.children = {};\n    this.isEnd = false;\n  }\n}\n// Insert\nlet node = root;\nfor(let c of word){\n  if(!node.children[c])\n    node.children[c] = new TrieNode();\n  node = node.children[c];\n}\nnode.isEnd = true;\n// Search\nnode = root;\nfor(let c of word){\n  if(!node.children[c]) return false;\n  node = node.children[c];\n}\nreturn node.isEnd;</pre>",

    var done = doneCount();
    var pct = total ? (done/total*100) : 0;
    progressFill.style.width = pct + "%";
  }

  function diffStats(){
    var totals={E:0,M:0,H:0},dones={E:0,M:0,H:0};
    TOPICS.forEach(function(t){
      t.problems.forEach(function(p){
        totals[p.l]=(totals[p.l]||0)+1;
        if(data[p.t]) dones[p.l]=(dones[p.l]||0)+1;
      });
    });
    return {totals:totals,dones:dones};
  }

  function updateStats(){
    var total = totalProblems();
    var done = doneCount();
    var ds = diffStats();
    var html = '<div class="stat-card"><span class="stat-num">'+done+'/'+total+'</span><span class="stat-label">Solved</span></div>'+
      '<div class="stat-card"><span class="stat-num">'+(ds.dones.E||0)+'/'+(ds.totals.E||0)+'</span><span class="stat-label done" style="color:var(--emerald)">Easy</span></div>'+
      '<div class="stat-card"><span class="stat-num">'+(ds.dones.M||0)+'/'+(ds.totals.M||0)+'</span><span class="stat-label done" style="color:var(--gold)">Medium</span></div>'+
      '<div class="stat-card"><span class="stat-num">'+(ds.dones.H||0)+'/'+(ds.totals.H||0)+'</span><span class="stat-label done" style="color:#f87171">Hard</span></div>';
    var ePct = ds.totals.E ? (ds.dones.E/ds.totals.E*100) : 0;
    var mPct = ds.totals.M ? (ds.dones.M/ds.totals.M*100) : 0;
    var hPct = ds.totals.H ? (ds.dones.H/ds.totals.H*100) : 0;
    html += '<div class="diff-chart"><div class="diff-bar diff-bar-e" style="width:'+ePct+'%"></div><div class="diff-bar diff-bar-m" style="width:'+mPct+'%"></div><div class="diff-bar diff-bar-h" style="width:'+hPct+'%"></div></div>';
    statsBar.innerHTML = html;
  }

  function renderGrid(){
    var html = "";
    TOPICS.forEach(function(t){
      var done = 0;
      t.problems.forEach(function(p){ if(data[p.t]) done++; });
      var tag = done + "/" + t.problems.length + " done";
      var cls = done === t.problems.length ? "tag done" : "tag";
      html += '<div class="topic-card" data-topic="'+t.id+'"><h3>'+esc(t.title)+'</h3><p>'+esc(t.desc)+'</p><span class="'+cls+'">'+tag+'</span></div>';
    });
    grid.innerHTML = html;
    grid.querySelectorAll(".topic-card").forEach(function(card){
      card.addEventListener("click", function(){ openTopic(card.getAttribute("data-topic")); });
    });
    updateProgress();
    updateStats();
  }

  function openTopic(id){
    currentTopic = TOPICS.find(function(t){return t.id===id});
    if(!currentTopic) return;
    topicTitle.textContent = currentTopic.title;
    diffFilter.value = "all";
    cheatBody.innerHTML = currentTopic.cheat || "";
    cheatBody.classList.remove("open");
    cheatToggle.classList.remove("open");
    cheatToggle.textContent = "Show patterns &amp; cheat sheet ▼";
    renderProblems();
    gridView.style.display = "none";
    topicView.style.display = "block";
    navBack.classList.add("show");
  }

  function renderProblems(){
    var topic = currentTopic;
    if(!topic) return;
    var flt = diffFilter.value;
    var html = "";
    topic.problems.forEach(function(p){
      if(flt !== "all" && p.l !== flt) return;
      var checked = data[p.t] ? "checked" : "";
      html += '<div class="problem-item'+(checked?" done":"")+'" data-problem="'+escAttr(p.t)+'">'+
        '<input type="checkbox" class="problem-check" '+checked+' />'+
        '<div class="problem-info"><div class="problem-title">'+esc(p.t)+'</div><div class="problem-desc">'+esc(p.d)+'</div>'+
        '<span class="problem-diff diff-'+p.l+'">'+diff[p.l]+'</span></div>'+
        '<div class="problem-links">'+
        '<a href="'+escAttr(p.lc)+'" target="_blank" rel="noopener" class="lc-link">LeetCode</a>'+
        '<a href="'+escAttr(p.gf)+'" target="_blank" rel="noopener" class="gfg-link">GFG</a>'+
        '</div></div>';
    });
    problemList.innerHTML = html || "<p style='color:var(--muted);padding:1rem'>No problems match this filter.</p>";
    problemList.querySelectorAll(".problem-check").forEach(function(cb){
      cb.addEventListener("change", function(){
        var item = cb.closest(".problem-item");
        var title = item.getAttribute("data-problem");
        if(cb.checked){ data[title] = true; item.classList.add("done"); }
        else { delete data[title]; item.classList.remove("done"); }
        save();
        updateGridCounts();
        updateProgress();
        updateStats();
      });
    });
  }

  function updateGridCounts(){
    TOPICS.forEach(function(t){
      var done = 0;
      t.problems.forEach(function(p){ if(data[p.t]) done++; });
      var cards = grid.querySelectorAll(".topic-card");
      for(var i=0;i<cards.length;i++){
        if(cards[i].getAttribute("data-topic")===t.id){
          var tag = cards[i].querySelector(".tag");
          if(tag){
            tag.textContent = done + "/" + t.problems.length + " done";
            tag.className = "tag" + (done===t.problems.length?" done":"");
          }
          break;
        }
      }
    });
    updateStats();
  }

  function closeTopic(){
    gridView.style.display = "block";
    topicView.style.display = "none";
    navBack.classList.remove("show");
    renderGrid();
  }

  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
  function escAttr(s){return String(s).replace(/"/g,"&quot;")}

  document.getElementById("backBtn").addEventListener("click", closeTopic);
  navBack.addEventListener("click", closeTopic);
  document.getElementById("chestBack").addEventListener("click", function(){ window.location='index.html'; });
  document.getElementById("logoHome").addEventListener("click", function(){ if(topicView.style.display==="block") closeTopic() });
  diffFilter.addEventListener("change", renderProblems);

  cheatToggle.addEventListener("click", function(){
    var open = cheatBody.classList.toggle("open");
    cheatToggle.classList.toggle("open");
    cheatToggle.textContent = open ? "Hide patterns &amp; cheat sheet ▲" : "Show patterns &amp; cheat sheet ▼";
  });

  renderGrid();
})();
</script>
</body>
</html>
